<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Map</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>

html,
body {

  margin:0;
  padding:0;
  height:100%;

}

#map {

  width:100%;
  height:100vh;

}

</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map')

.setView([-13.5, -72.5], 8);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{

  attribution:'© OpenStreetMap'

}

).addTo(map);

</script>

</body>

</html>
