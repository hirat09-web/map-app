<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html, body, #map{

  height:100%;

  margin:0;

}

</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map')

.setView([-13.5, -72.5], 8);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'

).addTo(map);

</script>

</body>
</html>
