<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }

/* UIボックス */
.control-box {
  position:absolute;
  left:10px;
  z-index:1000;
  background:white;
  padding:8px;
  margin-bottom:5px;
  border-radius:6px;
  box-shadow:0 0 5px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- ===== エリア選択 ===== -->
<div class="control-box" style="top:10px;">
  <b>エリア選択</b><br>
  <button onclick="showArea('Huanipaca')">Huanipaca</button><br>
  <button onclick="showArea('Yanatile')">Yanatile</button><br>
  <button onclick="showArea('SJO')">SJO</button>
</div>

<!-- ===== 透明度 ===== -->
<div class="control-box" style="top:130px;">
  <b>透明度</b><br>
  <input type="range" min="0" max="1" step="0.1" value="0.6" id="opacitySlider">
</div>

<!-- ===== ラベルON/OFF ===== -->
<div class="control-box" style="top:200px;">
  <label>
    <input type="checkbox" id="labelToggle" checked>
    地名ラベル
  </label>
</div>

<div id="map"></div>

<script>

// ===== 地図 =====
var map = L.map('map').setView([-13.5, -72.5], 8);

// ===== ベースマップ =====
var osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var esri = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

// 切替
L.control.layers({
  "OSM": osm,
  "衛星": esri
}).addTo(map);


// ===== ラベル（最前面） =====
map.createPane('labelsPane');
map.getPane('labelsPane').style.zIndex = 650;
map.getPane('labelsPane').style.pointerEvents = 'none';

var labels = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png',
  { pane: 'labelsPane' }
).addTo(map);


// ===== 状態管理 =====
var currentLayers = [];
var boundaryLayer;
var activeLayer = null;


// ===== スライダー =====
document.getElementById("opacitySlider").addEventListener("input", function(e) {
  if (activeLayer) {
    activeLayer.setOpacity(parseFloat(e.target.value));
  }
});

// ===== ラベルON/OFF =====
document.getElementById("labelToggle").addEventListener("change", function(e) {
  if (e.target.checked) {
    map.addLayer(labels);
  } else {
    map.removeLayer(labels);
  }
});

// ===== レイヤ切替時 =====
map.on('overlayadd', function(e) {
  activeLayer = e.layer;
});


// ===== データ =====
var areaData = {

  "Huanipaca": {
    bounds: [[-13.58,-73.17],[-13.38,-72.83]],
    fire: 'Huanipaca_fire.png',
    water: 'Huanipaca_water.png',
    degradation: 'Huanipaca_degradation.png',
    boundary: 'Huanipaca.geojson'
  },

  "Yanatile": {
    bounds: [[-13.03,-72.38],[-12.50,-71.82]],
    fire: 'Yanatile_fire.png',
    water: 'Yanatile_water.png',
    degradation: 'Yanatile_degradation.png',
    boundary: 'Yanatile.geojson'
  },

  "SJO": {
    bounds: [[-14.27,-69.22],[-14.13,-68.96]],
    fire: 'SJO_fire.png',
    water: 'SJO_water.png',
    degradation: 'SJO_degradation.png',
    boundary: 'SJO.geojson'
  }
};


// ===== エリア表示 =====
function showArea(area) {

  var data = areaData[area];

  // 削除
  currentLayers.forEach(layer => map.removeLayer(layer));
  currentLayers = [];

  if (boundaryLayer) {
    map.removeLayer(boundaryLayer);
  }

  // ズーム
  map.fitBounds(data.bounds);

  // ラスタ
  var fire = L.imageOverlay(data.fire, data.bounds, {opacity:0.6});
  var water = L.imageOverlay(data.water, data.bounds, {opacity:0.6});
  var deg = L.imageOverlay(data.degradation, data.bounds, {opacity:0.6});

  fire.addTo(map);
  currentLayers.push(fire);
  activeLayer = fire;

  // レイヤUI
  var overlays = {
    "火災リスク": fire,
    "水資源": water,
    "森林劣化": deg
  };

  if (window.layerControlOverlay) {
    map.removeControl(window.layerControlOverlay);
  }

  window.layerControlOverlay = L.control.layers(null, overlays).addTo(map);

  // Boundary
  fetch(data.boundary)
    .then(res => res.json())
    .then(geojson => {
      boundaryLayer = L.geoJSON(geojson, {
        style: { color: "red", weight: 2, fill: false }
      }).addTo(map).bringToFront();
    });

  // ラベル最前面
  labels.bringToFront();
}


// ===== 初期表示 =====
showArea('Huanipaca');

</script>

</body>
</html>
