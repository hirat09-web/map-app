<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }
</style>
</head>

<body>

<!-- ===== ボタン ===== -->
<div style="position:absolute; top:10px; left:10px; z-index:1000;">
  <button onclick="showArea('Huanipaca')">Huanipaca</button>
  <button onclick="showArea('Yanatile')">Yanatile</button>
  <button onclick="showArea('SJO')">San Juan del Oro</button>
</div>

<!-- ===== スライダー ===== -->
<div style="position:absolute; top:80px; left:10px; z-index:1000; background:white; padding:5px;">
  透明度:
  <input type="range" min="0" max="1" step="0.1" value="0.6" id="opacitySlider">
</div>

<div id="map"></div>

<script>

// ===== 地図作成 =====
var map = L.map('map').setView([-13.5, -72.5], 8);

// ===== ベースマップ =====
var osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '© OpenStreetMap' }
).addTo(map);

// 衛星
var esri = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Tiles © Esri' }
);

// ⭐ ラベル（地名）専用レイヤ（常に上に表示）
var labels = L.tileLayer(
  'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
  { attribution: '© OpenStreetMap' }
).addTo(map);

// ベースマップ切替
var baseMaps = {
  "OSM": osm,
  "衛星": esri
};

L.control.layers(baseMaps).addTo(map);


// ===== 状態管理 =====
var currentLayers = [];
var boundaryLayer;
var activeLayer = null;


// ===== スライダー =====
document.getElementById("opacitySlider").addEventListener("input", function(e) {
  if (activeLayer) {
    activeLayer.setOpacity(parseFloat(e.target.value));
  }
});


// ===== レイヤ切替時 =====
map.on('overlayadd', function(e) {
  activeLayer = e.layer;
});


// ===== エリアデータ =====
var areaData = {

  "Huanipaca": {
    bounds: [[-13.58,-73.17],[-13.38,-72.83]],
    fire: 'Huanipaca_fire.png',
    water: 'Huanipaca_water.png',
    degradation: 'Huanipaca_degradation.png',
    boundary: 'Huanipaca.geojson'
  },

  "Yanatile": {
    bounds: [[-13.03,-72.38],[-12.50,-71.82]],
    fire: 'Yanatile_fire.png',
    water: 'Yanatile_water.png',
    degradation: 'Yanatile_degradation.png',
    boundary: 'Yanatile.geojson'
  },

  "SJO": {
    bounds: [[-14.27,-69.22],[-14.13,-68.96]],
    fire: 'SJO_fire.png',
    water: 'SJO_water.png',
    degradation: 'SJO_degradation.png',
    boundary: 'SJO.geojson'
  }
};


// ===== エリア表示 =====
function showArea(area) {

  var data = areaData[area];

  // ① ラスタ削除
  currentLayers.forEach(layer => map.removeLayer(layer));
  currentLayers = [];

  // ② Boundary削除
  if (boundaryLayer) {
    map.removeLayer(boundaryLayer);
  }

  // ③ ズーム
  map.fitBounds(data.bounds);

  // ④ ラスタ作成
  var fire = L.imageOverlay(data.fire, data.bounds, {opacity:0.6});
  var water = L.imageOverlay(data.water, data.bounds, {opacity:0.6});
  var deg = L.imageOverlay(data.degradation, data.bounds, {opacity:0.6});

  // ⑤ 初期表示
  fire.addTo(map);
  currentLayers.push(fire);
  activeLayer = fire;

  // ⑥ レイヤ切替UI
  var overlays = {
    "火災リスク": fire,
    "水資源": water,
    "森林劣化": deg
  };

  if (window.layerControlOverlay) {
    map.removeControl(window.layerControlOverlay);
  }

  window.layerControlOverlay = L.control.layers(null, overlays).addTo(map);

  // ⑦ Boundary
  fetch(data.boundary)
    .then(res => res.json())
    .then(geojson => {
      boundaryLayer = L.geoJSON(geojson, {
        style: {
          color: "red",
          weight: 2,
          fill: false
        }
      }).addTo(map).bringToFront();
    });

  // ⭐ ラベルを最前面に
  labels.bringToFront();
}


// ===== 初期表示 =====
showArea('Huanipaca');

</script>

</body>
</html>
