<script>

// ================= 地図 =================

var map = L.map('map', {
  zoomControl:false
}).setView([-13.5, -72.5], 8);

L.control.zoom({
  position:'bottomright'
}).addTo(map);

// ================= ベースマップ =================

var osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var esri = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

L.control.layers({
  "Mapa": osm,
  "Satélite": esri
}).addTo(map);

// ================= ラベル =================

map.createPane('labelsPane');

map.getPane('labelsPane').style.zIndex = 650;
map.getPane('labelsPane').style.pointerEvents = 'none';

var labels = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png',
  {
    pane:'labelsPane'
  }
).addTo(map);

// ================= 状態 =================

var currentArea = null;

var boundaryLayer = null;

var fireLayers = [];

var fireRiskLayer = null;
var waterLayer = null;
var degradationLayer = null;

// ================= 年別色 =================

var fireColors = {

  2017:"#ffffb2",
  2018:"#fed976",
  2019:"#feb24c",
  2020:"#fd8d3c",
  2021:"#fc4e2a",
  2022:"#e31a1c",
  2023:"#bd0026",
  2024:"#800026",
  2025:"#4d0018"

};

// ================= データ =================

var areaData = {

  "Huanipaca": {

    bounds:[[-13.58,-73.17],[-13.38,-72.83]],

    fire:'Huanipaca_fire.png',

    water:'Huanipaca_water.png',

    degradation:'Huanipaca_degradation.png',

    boundary:'Huanipaca.geojson'

  },

  "Yanatile": {

    bounds:[[-13.03,-72.38],[-12.50,-71.82]],

    fire:'Yanatile_fire.png',

    water:'Yanatile_water.png',

    degradation:'Yanatile_degradation.png',

    boundary:'Yanatile.geojson'

  },

  "SJO": {

    bounds:[[-14.27,-69.22],[-14.13,-68.96]],

    fire:'SJO_fire.png',

    water:'SJO_water.png',

    degradation:'SJO_degradation.png',

    boundary:'SJO.geojson'

  }

};

// ================= メニュー =================

function togglePanel(){

  var panel =
    document.getElementById("panelContent");

  if(panel.style.display === "none"){

    panel.style.display = "block";

  } else {

    panel.style.display = "none";

  }

}

// ================= ラベル ON/OFF =================

document.getElementById("labelToggle")

.addEventListener("change", function(e){

  if(e.target.checked){

    map.addLayer(labels);

  } else {

    map.removeLayer(labels);

  }

});

// ================= 透明度 =================

document.getElementById("opacitySlider")

.addEventListener("input", function(e){

  var opacity =
    parseFloat(e.target.value);

  fireLayers.forEach(layer => {

    layer.setStyle({

      fillOpacity:opacity,
      opacity:opacity

    });

  });

  if(fireRiskLayer){

    fireRiskLayer.setOpacity(opacity);

  }

  if(waterLayer){

    waterLayer.setOpacity(opacity);

  }

  if(degradationLayer){

    degradationLayer.setOpacity(opacity);

  }

});

// ================= エリア表示 =================

function showArea(area){

  currentArea = area;

  clearFires();

  var data = areaData[area];

  map.fitBounds(data.bounds);

  // ===== 古い境界削除 =====

  if(boundaryLayer){

    map.removeLayer(boundaryLayer);

  }

  // ===== 古い画像削除 =====

  if(fireRiskLayer){

    map.removeLayer(fireRiskLayer);

  }

  if(waterLayer){

    map.removeLayer(waterLayer);

  }

  if(degradationLayer){

    map.removeLayer(degradationLayer);

  }

  // ===== 火災リスク =====

  fireRiskLayer = L.imageOverlay(

    data.fire,

    data.bounds,

    {
      opacity:0.6
    }

  ).addTo(map);

  // ===== 水資源 =====

  waterLayer = L.imageOverlay(

    data.water,

    data.bounds,

    {
      opacity:0.6
    }

  );

  // ===== 森林劣化 =====

  degradationLayer = L.imageOverlay(

    data.degradation,

    data.bounds,

    {
      opacity:0.6
    }

  );

  // ===== レイヤ切替 =====

  var overlays = {

    "Riesgo de incendio":
      fireRiskLayer,

    "Recursos hídricos":
      waterLayer,

    "Degradación":
      degradationLayer

  };

  if(window.overlayControl){

    map.removeControl(
      window.overlayControl
    );

  }

  window.overlayControl =

    L.control.layers(
      null,
      overlays
    ).addTo(map);

  // ===== 境界 =====

  fetch(data.boundary)

  .then(res => res.json())

  .then(geojson => {

    boundaryLayer = L.geoJSON(geojson, {

      style:{

        color:"red",

        weight:2,

        fillOpacity:0

      }

    }).addTo(map);

    boundaryLayer.bringToFront();

  });

  labels.bringToFront();

}

// ================= 火災表示 =================

function loadSelectedFires(){

  if(!currentArea){

    alert("Seleccione un distrito.");

    return;

  }

  clearFires();

  var checkedYears =

    document.querySelectorAll(
      '.year-list input:checked'
    );

  checkedYears.forEach(item => {

    var year = item.value;

    var path =

      'fires/' +
      currentArea +
      '_fire_' +
      year +
      '.geojson';

    fetch(path)

    .then(res => {

      if(!res.ok){

        throw new Error(path);

      }

      return res.json();

    })

    .then(data => {

      var color =
        fireColors[year];

      var layer = L.geoJSON(data, {

        style:function(){

          return {

            color:color,

            weight:1,

            fillColor:color,

            fillOpacity:parseFloat(

              document.getElementById(
                "opacitySlider"
              ).value

            )

          };

        },

        pointToLayer:function(feature, latlng){

          return L.circleMarker(latlng, {

            radius:5,

            fillColor:color,

            color:"#000",

            weight:1,

            fillOpacity:parseFloat(

              document.getElementById(
                "opacitySlider"
              ).value

            )

          });

        },

        onEachFeature:function(feature, layer){

          layer.bindPopup(

            "<b>Año:</b> " + year

          );

        }

      }).addTo(map);

      fireLayers.push(layer);

      layer.bringToFront();

      if(boundaryLayer){

        boundaryLayer.bringToFront();

      }

      labels.bringToFront();

    })

    .catch(err => {

      console.log(err);

      alert(
        "No se pudo cargar:\n" + path
      );

    });

  });

}

// ================= 火災削除 =================

function clearFires(){

  fireLayers.forEach(layer => {

    map.removeLayer(layer);

  });

  fireLayers = [];

}

// ================= 凡例 =================

var legend = L.control({
  position:'bottomright'
});

legend.onAdd = function(map){

  var div = L.DomUtil.create(
    'div',
    'legend'
  );

  div.innerHTML +=
    "<b>Incendios</b><br>";

  for(var year in fireColors){

    div.innerHTML +=

      '<i style="background:' +
      fireColors[year] +
      '"></i> ' +

      year +

      '<br>';

  }

  return div;

};

legend.addTo(map);

</script>
